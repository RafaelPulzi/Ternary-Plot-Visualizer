<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gráfico Ternário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css" />
  <style>

  </style>
</head>

<header>
  <H1>Gráfico Ternário</H1>
</header>

<body>

  <div class="container">
    <div class="row align-items-stretch">
      <!-- Coluna para os botões -->
      <div class="col-lg-3">
        <!-- Div com quadrado atrás -->
        <div class="p-4 mb-3 bg-secondary border rounded shadow" style="height: 99%;">
            <!-- Conteúdo da div -->
            <h3>Nome do Usuário</h3>
            <ul class="list-unstyled">
                <li class="mb-3"><button id="bt_dataInput" class="btn btn-outline-light" onclick="abraDataInput()">Data Input</button></li>
                <li class="mb-3"><button id="bt_points" class="btn btn-outline-light">Points</button></li>
                <li class="mb-3"><button id="bt_lines" class="btn btn-outline-light" onclick="abraLines()">Lines</button></li>
                <li class="mb-3"><button id="bt_apperance" class="btn btn-outline-light">Apperance</button></li>
                <li class="mb-3"><button id="bt_printAndExport" class="btn btn-outline-light" onclick="exportCanvas()">Print and Export</button></li>
            </ul>
        </div>
    </div>

      <!-- Coluna para Resumo e Gráfico -->
      <div class="col-lg-9">
        <!-- Coluna para Resumo -->
        <div class="row">
          <div class="col-lg-6">
            <div class="p-4 mb-3 custom-bg border rounded shadow-sm">
              <h4>Resumo</h4>
            </div>
          </div>
          <!-- Coluna para Dados -->
          <div class="col-lg-6">
            <div class="p-4 mb-3 custom-bg border rounded shadow">
              <h4>Dados</h4>
              <label for="labelSelect">Escolha o Rótulo:</label>
              <select id="labelSelect" onchange="carregarDados()">
                <option value="">Selecione...</option>
              </select><br><br>
              <!-- Dados Principais-->
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group mb-1">
                    <label for="">R sej/Unit</label>
                    <input type="text" id="inputR" disabled>
                  </div>
                  <div class="form-group mb-1">
                    <label for="">N sej/Unit</label>
                    <input type="text" id="inputN" disabled>
                  </div>
                  <div class="form-group mb-1">
                    <label for="">F sej/Unit</label>
                    <input type="text" id="inputF" disabled>
                  </div>
                  <div class="form-group mb-1">
                    <label for="">Mr sej/Unit</label>
                    <input type="text" id="inputMr" disabled>
                  </div>
                  <div class="form-group mb-1">
                    <label for="">Mn sej/Unit</label>
                    <input type="text" id="inputMn" disabled>
                  </div>
                  <div class="form-group mb-1">
                    <label for="">Sr sej/Unit</label>
                    <input type="text" id="inputSr" disabled>
                  </div>
                  <div class="form-group mb-1">
                    <label for="">Sn sej/Unit</label>
                    <input type="text" id="inputSn" disabled>
                  </div>
                  <div class="form-group mb-1">
                    <label for="">Y sej/Unit</label>
                    <input type="text" id="inputY" disabled>
                  </div>
                </div>
                <!--
      Dados Providos por calculo 
              -->
                <div class="col-md-6">
                  <div class="form-group mb-1">
                    <label for="">EYR</label>
                    <input type="text" id="inputEYR" disabled>
                    <!--<label for="">EYR=Y/(Mn+Sn)</label>-->
                  </div>
                  <div class="form-group mb-1">
                    <label for="">EIR</label>
                    <input type="text" id="inputEIR" disabled>
                    <!--<label for="">EIR=(Mr+Mn+Sr+Sn)/(R+N)</label>-->
                  </div>
                  <div class="form-group mb-1">
                    <label for="ELR">ELR</label>
                    <input type="text" id="inputELR" disabled>
                    <!--<label for="ELR">ELR=(N+Mn+Sn)/(R+Mr+Sr)</label>-->
                  </div>
                  <div class="form-group mb-1">
                    <label for="">ESI</label>
                    <input type="text" id="inputSI" disabled>
                    <!--<label for="">ESI=EYR/ELR</label>-->
                  </div>
                  <div class="form-group mb-1">
                    <label for="">%R</label>
                    <input type="text" id="inputPorcentageR" disabled>
                    <!--<label for="">%R=(R+Mr+Sr)/Y</label>-->
                  </div>
                                <!--
      Dados de porcentagem de cada extremidade do ternário 
    -->

                  <div class="form-group mb-1">
                    <label for="">R+Mr+Sr(%)</label>
                    <input type="text" id="porcentageR" disabled>
                  </div>
                  <div class="form-group mb-1">
                    <label for="">N(%)</label>
                    <input type="text" id="porcentageN" disabled>
                  </div>
                  <div class="form-group mb-1">
                    <label for="">Mn+Sn(%)</label>
                    <input type="text" id="porcentageF" disabled>
                  </div>
                </div>
              </div>


            </div>
          </div>
        </div>

        <!-- Coluna para o gráfico -->
        <div class="row justify-content-center">
          <div class="col-lg-12 ">
            <div class="p-4 mb-3 custom-bg border rounded shadow text-center">
              <canvas id="ternaryChart" width="550" height="400"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>






  <!--

    ==================================================
                    POP-UPS da Aplicação - COMEÇO
    ==================================================

  -->
  <!--ABRE AS INFORMAÇÔES DA OPÇÃO "DataInput"-->

  <div id="popup-dataInput" class="popup">
    <button id="fecheInformation" class="fechePopup" onclick="fecheDataInput()">X</button>
    <h3>Data Input</h3>
    <label for="">R: </label>
    <input type="number" id="dataInput_R"><br>
    <label for="">Mr: </label>
    <input type="number" id="dataInput_Mr"><br>
    <label for="">Sr: </label>
    <input type="number" id="dataInput_Sr"><br>
    <label for="">N: </label>
    <input type="number" id="dataInput_N"><br>
    <label for="">Mn: </label>
    <input type="number" id="dataInput_Mn"><br>
    <label for="">Sn: </label>
    <input type="number" id="dataInput_Sn"><br>

    <button onclick="enviarDados()">Enviar</button>

  </div>




  <!--ABRE AS INFORMAÇÔES DA OPÇÃO "Points"-->

  <!--ABRE AS INFORMAÇÔES DA OPÇÃO "Lines"-->
  <div id="popup-lines" class="popup">
    <button id="fecheLines" class="fechePopup" onclick="fecheLines()">X</button>
    <h2>Lines</h2>
    <div class="inline">
      <button onclick="mostrarConteudoLines('sourcesContent')">Sources</button>
      <button onclick="mostrarConteudoLines('sustainableContent')">Sustainable</button>
      <button onclick="mostrarConteudoLines('sensibilityContent')">Sensibility</button>
      <button id="bt_simergy" onclick="togglePontoMedio()">Simergy</button>
    </div>
    <!--AQUI ESTÃO AS LINHAS DE SOURCES, OUTRAS LINHAS SERÃO REFERENCIADAS ABAIXO-->
    <div id="sourcesContent">
      <h3>Select the desire Source Lines</h3>
      <input type="checkbox" id="sourceR_Mr_Sr">
      <label>
        R+Mr+Sr
      </label>
      <input type="number" id="valueSourceR_Mr_Sr" value="10" min="0" max="100" /><br>
      <input type="checkbox" id="sourceN" />
      <label>
        N
      </label>
      <input type="number" id="valueSourceN" value="10" min="0" max="100" /><br>
      <input type="checkbox" id="sourceMn_Sn" />
      <label>
        Mn+Sn
      </label>
      <input type="number" id="valueSourceMn_Sn" value="10" min="0" max="100" />
      <div id="Lines_Of_Simmetry">
        <h3>Lines Of Simmetry</h3>
        <input type="checkbox" id="Active_Simmergy_Lines" />
        <label>
          Active Simmergy Lines
        </label><br>
        <input type="checkbox" id="Active_Regions" />
        <label>
          Active Regions
        </label>
        <div class="inline">
          <button>OK</button>
          <button>Apply</button>
          <button>Cancel</button>
        </div>
      </div>
    </div>


    <div id="sustainableContent" class="hidden">
      <h3>Select the desire Source Lines</h3>
      <input type="checkbox" id="ESI_K1">
      <label>
        ESI = k1
      </label>
      <input type="number" id="valueESI_K1" value="7" min="0" oninput="updateValue(this, 0.1, 'valueESI_K1')" /><br>
      <input type="checkbox" id="ESI_K2">
      <label>
        ESI = k2
      </label>
      <input type="number" id="valueESI_K2" value="2.5" min="0" oninput="updateValue(this, 0.1, 'valueESI_K2')" /><br>
      <input type="checkbox" id="ESI_K3">
      <label>
        ESI = k3
      </label>
      <input type="number" id="valueESI_K3" value="2" min="0" oninput="updateValue(this, 0.1, 'valueESI_K3')" /><br>
    </div>

    <div id="sensibilityContent" class="hidden">
      <h3>Select the desire point</h3>
      <input type="checkbox" id="sensibilityR_MR_SR">
      <label>
        R+Mr+Sr
      </label>
      <select id="valueSelectPointR_MR_SR" onchange="carregarDadosSensibilityR_MR_SR()">
        <option value="">Selecione...</option>
      </select><br>

      </datalist>
      <input type="checkbox" id="sensibilityN">
      <label>
        N
      </label>
      <select id="valueSelectPointN" onchange="carregarDados()">
        <option value="">Selecione...</option>
      </select><br>

      </datalist>
      <input type="checkbox" id="sensibilityMN_SN">
      <label>
        Mn+Sn
      </label>
      <select id="valueSelectPointMN_SN" onchange="carregarDados()">
        <option value="">Selecione...</option>
      </select><br>

      </datalist>
    </div>
  </div>

  <!--ABRE AS INFORMAÇÔES DA OPÇÃO "Information"-->
  <div id="popup-information" class="popup">
    <button id="fecheInformation" class="fechePopup" onclick="fecheInformation()">X</button>
    <h2>Information</h2>



  </div>

  <!--ABRE AS INFORMAÇÔES DA OPÇÃO "Apperance"-->

  <!--ABRE AS INFORMAÇÔES DA OPÇÃO "Print And Export"-->

  <!--

    ==================================================
                    POP-UPS da Aplicação - FIM
    ==================================================

  -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous">
  </script>
  <script src="js/main.js">

  </script>

</body>

</html>
